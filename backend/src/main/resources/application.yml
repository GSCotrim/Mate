spring:
  application:
    name: mate
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/mate}
    username: ${DB_USERNAME:mate}
    password: ${DB_PASSWORD:mate}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600 # seconds

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
